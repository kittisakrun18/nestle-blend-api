version: "3.9"
services:
  nestle-api:
    image: nestle-api
    build:
      context: .
    volumes:
      - "/home/nestle-api/uploads:/home/nestle-api/uploads"
    ports:
      - "8080:8080"
    restart: always
    networks:
      - default

networks:
  default:
    external: true
    name: shared-network